<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    let money = 1000
    while (true) {
      let a = prompt(`
      请选择你的操作:
      1.查询余额
      2.取款
      3.存款
      4.退出`)
      if (a == '4') {
        break
      }
      switch (a) {
        case '1':
          alert(`你的余额为${money}`)
          break
        case '2':
          let num1 = +prompt('请输入取款金额')
          money -= num1
          alert(`你取款了${num1}元，当前余额为${money}`)
          break
        case '3':
          let num2 = +prompt('请输入存款金额')
          money += num2
          alert(`你存款了${num2}元，当前余额为${money}`)
          break



      }
    }
  </script>
</body>

</html>
