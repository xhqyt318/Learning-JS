<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    for (let i = 1; i < 10; i++) {
      document.write(i + '<br>')

    }
    let sum = 0
    for (let i = 1; i <= 100; i++) {
      if (i % 2 == 0) {
        sum += i
      }


      // sum += i // 等价于 sum = sum + i
    }
    document.write(sum + '<br>')
    let arr = ['马超', '张飞', '关羽', '赵云', '黄忠']
    for (let i = 0; i < arr.length; i++) {
      document.write(arr[i] + '<br>')
    }
  </script>
</body>

</html>
