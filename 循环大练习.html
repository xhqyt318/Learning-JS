<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    let i = 0
    while (i < 101) {
      document.write(i + '<br>')
      i++
    }
    let a = 0
    let sum = 0
    while (a < 101) {
      sum += a
      document.write(sum + '<br>')
      a++
    }
    let sum2 = 0
    let b = 0
    while (b < 101) {
      if (b % 2 == 0) {
        sum2 += b
      }
      b++
    }
    document.write(sum2 + '<br>')
  </script>
</body>

</html>
