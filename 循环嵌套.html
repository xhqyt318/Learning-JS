<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    let a = prompt('请输入行数 ')
    let b = prompt('请输入列数 ')
    for (let i = 1; i <= a; i++) {
      for (let j = 1; j <= b; j++) {
        document.write('*')
      }
      document.write('<br>')
    }
  </script>
</body>

</html>
