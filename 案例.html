<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    h2 {
      text-align: center;
    }

    table {
      border-collapse: collapse;
      margin: 0 auto;
      text-align: center;
    }

    th,
    td {
      border: 1px solid black;
      padding: 10px;
    }

    th {
      background-color: #f2f2f2;
    }
  </style>
</head>

<body>
  <h2>订单确认</h2>

  <script>
    let a = prompt('请输入地址')
    let price = +prompt('请输入单价')
    let num = +prompt('请输入数量')
    let money = price * num
    document.write(`
    <table>
    <tr>
      <th>商品名称</th>
      <th>单价</th>
      <th>数量</th>
      <th>金额</th>
      <th>地址</th>
    </tr>
    <tr>
      <td>小米15pro</td>
      <td>${price}元</td>      
      <td>${num}</td>
      <td>${money}元</td>
      <td>${a}</td>
    </tr>
  </table>
    `)
  </script>
</body>

</html>
