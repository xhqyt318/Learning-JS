<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    let a = prompt('请输入第一个数字')
    let b = prompt('请输入第二个数字')
    let c = prompt('请输入运算符')
    switch (c) {
      case '+':
        console.log(a + b)
        break
      case '-':
        console.log(a - b)
        break
      case '*':
        console.log(a * b)
        break
      case '/':
        console.log(a / b)
        break
      default:
        console.log('请输入正确的运算符')
        break
    }
  </script>
</body>

</html>
