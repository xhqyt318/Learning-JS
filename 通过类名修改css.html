<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box {
      border: 1px solid #000;
      width: 400px;
      height: 200px;
      padding: 50px 100px;
    }

    .example {
      color: red;
      font-size: 30px;
    }
  </style>
</head>

<body>
  <div class="box">
    通过类名修改css
  </div>
  <script>
    const box = document.querySelector('.box')
    box.className = 'example'

  </script>
</body>

</html>
